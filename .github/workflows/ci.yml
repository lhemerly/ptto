name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint (clippy)
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --locked --all-targets --all-features

      - name: Test
        run: cargo test --locked --all-targets --all-features

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Install kcov build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libelf-dev \
            libdw-dev \
            cmake \
            gcc \
            binutils-dev \
            libiberty-dev

      - name: Build tests with dead-code linking for better coverage
        env:
          RUSTFLAGS: -C link-dead-code
        run: |
          cargo test --locked --all-targets --all-features --no-run --message-format=json \
            | jq -r 'select(.profile.test == true and .executable != null) | .executable' \
            > target/test-binaries.txt

      - name: Build kcov from master
        run: |
          wget https://github.com/SimonKagstrom/kcov/archive/master.tar.gz
          tar xzf master.tar.gz
          cd kcov-master
          mkdir build
          cd build
          cmake ..
          make
          make install DESTDIR=../../kcov-build

      - name: Generate coverage reports with kcov
        run: |
          mkdir -p target/cov
          while read -r file; do
            [ -x "$file" ] || continue
            out_dir="target/cov/$(basename "$file")"
            mkdir -p "$out_dir"
            ./kcov-build/usr/local/bin/kcov \
              --exclude-pattern=/.cargo,/usr/lib \
              "$out_dir" \
              "$file"
          done < target/test-binaries.txt

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: target/cov
          fail_ci_if_error: true
